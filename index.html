<!-- Chỉ cập nhật phần script form submit -->

<script>
    // ========== Form Submit ==========
    $('#linkForm').on('submit', async function(e) {
        e.preventDefault();

        const shopeeUrl = $('#shopeeUrl').val().trim();

        if (!shopeeUrl) {
            showToast('❌ Vui lòng nhập link Shopee', 'warning');
            $('#shopeeUrl').focus();
            return;
        }

        if (!API_URL) {
            showToast('❌ Config chưa được load', 'error');
            return;
        }

        $('#submitBtn').prop('disabled', true);
        $('#btnText').text('Đang xử lý...');
        $('.spinner-border-custom').addClass('show');
        $('#errorAlert').hide();
        $('#resultsSection').removeClass('show');
        $('#emptyState').show();

        try {
            const response = await fetch(
                `${API_URL}/create-link?origin_link=${encodeURIComponent(shopeeUrl)}`
            );

            const data = await response.json();

            if (!response.ok) {
                throw new Error(data.detail || 'Có lỗi xảy ra');
            }

            // ========== Display Results ==========
            let html = `
                <div class="link-box">
                    <div class="link-box-header">
                        <strong>
                            <i class="fas fa-check-circle text-success"></i>
                            ✅ Tạo Link Thành Công
                        </strong>
                    </div>
            `;

            // ========== Hiển thị nếu giải mã từ short link ==========
            if (data.decodedFromShortLink) {
                html += `
                    <div class="link-info" style="background: #e3f2fd; border-left-color: #2196F3; margin-bottom: 1rem;">
                        <strong style="color: #2196F3;">
                            <i class="fas fa-sync-alt"></i> Bước 1: Giải Mã Short Link
                        </strong><br>
                        <small style="color: #666;">Input:</small><br>
                        <code style="word-break: break-all; font-size: 0.7rem; display: block; background: white; padding: 0.5rem; border-radius: 0.25rem; margin-top: 0.25rem;">
                            ${data.originalInput}
                        </code>
                        
                        <small style="color: #2196F3; display: block; margin-top: 0.75rem;">
                            <i class="fas fa-arrow-down"></i> ↓ Kết Quả Giải Mã ↓
                        </small>
                        <small style="color: #666;">Link Gốc:</small><br>
                        <code style="word-break: break-all; font-size: 0.7rem; display: block; background: white; padding: 0.5rem; border-radius: 0.25rem; margin-top: 0.25rem;">
                            ${data.originLink}
                        </code>
                    </div>
                `;
            }

            // ========== Hiển thị Link Affiliate Mới ==========
            html += `
                    <div class="link-info" style="background: #f0fdf4; border-left-color: #26de81;">
                        <strong style="color: #26de81;">
                            <i class="fas fa-link"></i> Bước ${data.decodedFromShortLink ? '2' : '1'}: Link Affiliate Mới
                        </strong><br>
                        <code style="word-break: break-all; font-size: 0.7rem; background: white; padding: 0.5rem; display: block; border-radius: 0.25rem; margin-top: 0.5rem;">
                            ${data.affiliateLink}
                        </code>
                    </div>

                    <div class="link-box-actions" style="margin-top: 1rem;">
                        <button type="button" class="copy-btn" onclick="copyToClipboard('${data.affiliateLink}')" style="flex: 1;">
                            <i class="fas fa-copy"></i> Copy Link
                        </button>
                    </div>
                </div>
            `;

            $('#linksContainer').html(html);
            $('#emptyState').hide();
            $('#resultsSection').addClass('show');
            $('#buyBtn').attr('href', data.affiliateLink);

            showToast(`✅ ${data.message}`);

        } catch (error) {
            console.error('Error:', error);
            $('#errorAlert')
                .html(`<strong><i class="fas fa-exclamation-circle"></i> Lỗi:</strong> ${error.message}`)
                .show();
            showToast(error.message, 'error');
        } finally {
            $('#submitBtn').prop('disabled', false);
            $('#btnText').text('Tạo Link Ngay');
            $('.spinner-border-custom').removeClass('show');
        }
    });
</script>
